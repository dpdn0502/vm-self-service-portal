<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IaaS Self-Service Tool</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #0078d4 !important; } /* Azure blue */
        .badge-running  { background-color: #28a745; }
        .badge-stopped  { background-color: #dc3545; }
        .badge-deallocated { background-color: #6c757d; }
    </style>
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand fw-bold">🖥️ IaaS Self-Service Tool</span>
            <div class="d-flex align-items-center text-white">
                <span class="me-3">👤 {{ session.user.name }}</span>
                <a href="/auth/logout" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
